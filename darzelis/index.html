<style>

@media(max-width:720px){.hero{max-width:230px}.hero h1{font-size:1.4em}.ages{top:auto;bottom:88px;right:14px;flex-direction:row;flex-wrap:wrap;max-width:210px}.ages .t{display:none}.legend,.hint{display:none}.panel{width:calc(100vw - 28px);right:14px;top:auto;bottom:14px;max-height:56vh}.priv{bottom:20px;max-width:180px}}

<script>
const COLORS={"Matematika":"#6d9bf0","Informatika":"#a688ec","Gamtos mokslai":"#58c2ae","Pažinimas":"#f2778f","Lietuvių kalba":"#f5b642","Visuomeninis ugdymas":"#e58ab8","Muzika":"#b993e6","Fizinis ugdymas":"#8bc78a","Etika":"#c98d86","Kalba ir komunikacija":"#f5b642","Emocijos ir santykiai":"#f08a8a","Menai ir kūryba":"#b993e6","Savarankiškumas":"#6db7e8","Mokėjimas mokytis":"#e8a4c9","Privatus papildymas":"#8a63c9"};
const FALLBACK="#b0a8c0";
const SUBJ_EN={"Matematika":"Early math","Informatika":"Digital & logic","Gamtos mokslai":"Nature & science","Pažinimas":"Cognition","Lietuvių kalba":"Language & literacy","Visuomeninis ugdymas":"Community","Muzika":"Music","Fizinis ugdymas":"Movement","Etika":"Values","Kalba ir komunikacija":"Language & communication","Emocijos ir santykiai":"Emotions & relationships","Menai ir kūryba":"Arts & creativity","Savarankiškumas":"Self-care & independence","Mokėjimas mokytis":"Learning to learn","Privatus papildymas":"Private extras"};
const STR={
 lt:{title:'Ką išmoksta <span class="tt">mažylis</span>? 🧸',
  sub:(t)=>`Atviras darželio žemėlapis tėvams: <b>${t}</b> gebėjimų nuo 2 iki 6 metų pagal oficialias Lietuvos programas. <b>Pasirink amžių</b> — pamatysi, kas auga dabar, o paliesk burbulą — ką paklausti vaiko.`,
  badge:'🧪 v0 juodraštis · valstybinės programos + privačių darželių sluoksnis ruošiamas',
  about:'ℹ️ Apie',big:'🗺️ Pilnas žemėlapis iki 12 kl.',credit:'Kuria Kristijonas Vasiliauskas · šaltiniai: Pasiekimų aprašas 2024, Priešmokyklinio BP',
  ages:'Amžius',all:'Visi',yrs:'m.',legend:'Sritys',priv:'➕ Privatūs darželiai',privN:'Rodyti, ką papildomai siūlo privatūs darželiai (Vilnius, Kaunas, Klaipėda…) — ruošiama',
  hint:'Tempk — sukti · Ratukas — priartinti · Paliesk burbulą',
  now:'🌱 Mokosi dabar',done:'✅ Greičiausiai jau moka',next:'✨ Kitas žingsnis',later:'🕐 Dar prieš akis',
  ask:'💬 Paklausk arba pažaisk',ev:'🌱 Pastebėsi, kai',dep:'Prieš tai',un:'Toliau augs',child:'jūsų mažylis',
  aboutHtml:`<span class="close" onclick="document.getElementById('about').classList.remove('open')">✕</span><h2>Apie darželio žemėlapį</h2>
  <h4>Kas čia?</h4><p>Žemėlapis tėvams ir auklėtojams: ką vaikas natūraliai mokosi 2–6 metais — iš oficialaus <b>Ikimokyklinio ugdymo pasiekimų aprašo (2024)</b> ir Priešmokyklinio ugdymo programos. Kiekvienas burbulas — vienas gebėjimas su klausimu ar žaidimu, kurį gali išbandyti šiandien.</p>
  <h4>Kaip naudotis?</h4><p>① Pasirink vaiko amžių — ryškūs burbulai = kas mokosi dabar, švelnūs = jau moka, kontūrai = kitas žingsnis. ② Paliesk burbulą — aprašymas + „paklausk vaiko". ③ Įjunk „Privatūs darželiai" — pamatysi, ką papildomai siūlo privatus ugdymas didžiuosiuose miestuose.</p>
  <h4>Svarbu</h4><p>Kiekvienas vaikas auga savo tempu — amžiai apytiksliai, tai ne testas, o žemėlapis smalsumui. v0 juodraštis, laukia pedagogų peržiūros.</p>
  <p style="margin-top:14px;color:#a89fb5;font-size:.8em">Kuria Kristijonas Vasiliauskas (Robotikos akademija · BrAIn Club) · duomenys atviri.</p>`},
 en:{title:'What does a <span class="tt">little one</span> learn? 🧸',
  sub:(t)=>`An open kindergarten map for parents: <b>${t}</b> skills from age 2 to 6, based on Lithuania's official early-education programs. <b>Pick an age</b> to see what's growing now; tap a bubble for a question to ask your child.`,
  badge:'🧪 v0 draft · state programs + private-kindergarten layer coming',
  about:'ℹ️ About',big:'🗺️ Full map to grade 12',credit:'Built by Kristijonas Vasiliauskas · sources: LT Achievement Framework 2024, Pre-primary curriculum · content in Lithuanian',
  ages:'Age',all:'All',yrs:'y.',legend:'Areas',priv:'➕ Private kindergartens',privN:'Show what private kindergartens (Vilnius, Kaunas, Klaipėda…) add — coming soon',
  hint:'Drag — spin · Scroll — zoom · Tap a bubble',
  now:'🌱 Learning now',done:'✅ Likely mastered',next:'✨ Next step',later:'🕐 Still ahead',
  ask:'💬 Ask or play',ev:'🌱 You will notice when',dep:'Comes before',un:'Grows into',child:'your little one',
  aboutHtml:`<span class="close" onclick="document.getElementById('about').classList.remove('open')">✕</span><h2>About this map</h2>
  <h4>What is this?</h4><p>A map for parents and educators: what a child naturally learns at ages 2–6, distilled from Lithuania's official <b>Early Childhood Achievement Framework (2024)</b> and pre-primary curriculum. Every bubble is one skill with a question or game you can try today.</p>
  <h4>How to use</h4><p>① Pick your child's age — bright bubbles are growing now, soft ones are likely mastered, outlined ones are the next step. ② Tap a bubble for the description and an "ask your child" idea. ③ Toggle "Private kindergartens" to see what private programs add in the biggest cities.</p>
  <h4>Note</h4><p>Every child grows at their own pace — ages are approximate. This is a map for curiosity, not a test. v0 draft, pending educator review. Topic content is in Lithuanian.</p>
  <p style="margin-top:14px;color:#a89fb5;font-size:.8em">Built by Kristijonas Vasiliauskas (Robotikos akademija · BrAIn Club) · open data.</p>`}
};
let LANG=localStorage.getItem('dz-lang')||'lt';
function hex2rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
const RGB={}; for(const s in COLORS) RGB[s]=hex2rgb(COLORS[s]); const RGBF=hex2rgb(FALLBACK);
function rgba(s,a){const c=RGB[s]||RGBF;return `rgba(${c[0]},${c[1]},${c[2]},${a})`}
let topics=[],deps=[],byId={},childs={},pars={},on={},ageSel=null,privOn=false;
let sel=null,ancestors=new Set(),descendants=new Set();
let introStart=0,introMax=0,introDone=false;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}
addEventListener('resize',resize);resize();
function hash(s){let h=0;for(const c of s)h=(h*31+c.charCodeAt(0))>>>0;return h}
const DEF={yaw:0,pitch:-0.10,dist:1250,panX:0,panY:0};
const cam={...DEF};
const F=900, WORLD_H=760, R_MAX=420;
let tween=null,lastInteract=0,drag=null;
function tweenTo(t,dur=650){tween={t0:performance.now(),dur,from:{...cam},to:{...cam,...t}}}
function stepTween(now){if(!tween)return;let k=Math.min(1,(now-tween.t0)/tween.dur);k=k<.5?4*k*k*k:1-Math.pow(-2*k+2,3)/2;for(const p of ['yaw','pitch','dist','panX','panY'])cam[p]=tween.from[p]+(tween.to[p]-tween.from[p])*k;if(k>=1)tween=null}
function setLang(l){LANG=l;localStorage.setItem('dz-lang',l);
 document.getElementById('langLT').classList.toggle('on',l==='lt');
 document.getElementById('langEN').classList.toggle('on',l==='en');
 applyLang(); if(sel)select(sel);}
window.setLang=setLang;
function subjName(s){return LANG==='en'?(SUBJ_EN[s]||s):s}
function applyLang(){const S=STR[LANG];
 document.getElementById('hTitle').innerHTML=S.title;
 document.getElementById('hSub').innerHTML=S.sub(topics.length||'~300');
 document.getElementById('hBadge').textContent=S.badge;
 document.getElementById('hAbout').textContent=S.about;
 document.getElementById('hBig').textContent=S.big;
 document.getElementById('hCredit').textContent=S.credit;
 document.getElementById('hAges').textContent=S.ages;
 document.getElementById('hLegend').textContent=S.legend;
 document.getElementById('hPriv').textContent=S.priv;
 document.getElementById('hPrivN').textContent=S.privN;
 document.getElementById('hHint').textContent=S.hint;
 document.getElementById('aboutSheet').innerHTML=S.aboutHtml;
 buildAges();
 const rows=document.getElementById('rows');
 [...rows.children].forEach(div=>{const s=div.dataset.s;div.querySelector('.lbl').textContent=subjName(s)});
}
function buildAges(){const S=STR[LANG];const el=document.getElementById('ageBtns');el.innerHTML='';
 const mk=(label,val)=>{const b=document.createElement('button');b.textContent=label;b.className=(ageSel===val)?'on':'';b.onclick=()=>{ageSel=val;buildAges()};el.appendChild(b)};
 mk(S.all,null);[2,3,4,5,6].forEach(a=>mk(a+' '+S.yrs,a));}
Promise.all([fetch('data/topics.json').then(r=>r.json()),fetch('data/dependencies.json').then(r=>r.json())]).then(([T,D])=>{
  topics=T.topics;deps=D.dependencies;
  topics.forEach(t=>{byId[t.id]=t;childs[t.id]=[];pars[t.id]=[];
    const h=hash(t.id);t.theta=(h%3600)/3600*Math.PI*2;t.rr=.35+((h>>4)%1000)/1000*.65;
    const jit=(((h>>8)%100)-50)/50;
    t.age=(t.ageRangeStart+t.ageRangeEnd)/2;
    const a=Math.max(0,Math.min(1,(t.age-2)/5)); // 2..7
    t.y3=(a-0.5)*WORLD_H + jit*26;
    const R=(0.25+0.75*a)*R_MAX*t.rr;
    t.x3=Math.cos(t.theta)*R; t.z3=Math.sin(t.theta)*R;
    t.baseR=2.2+t.centrality*14;});
  deps.forEach(e=>{childs[e.prerequisiteId].push(e.topicId);pars[e.topicId].push(e.prerequisiteId)});
  const seeds=[...topics].sort((a,b)=>b.centrality-a.centrality).slice(0,6).map(t=>t.id);
  const depth={};let fr=[...seeds];seeds.forEach(s=>depth[s]=0);let dmax=0;
  const und={};topics.forEach(t=>und[t.id]=[]);
  deps.forEach(e=>{und[e.topicId].push(e.prerequisiteId);und[e.prerequisiteId].push(e.topicId)});
  while(fr.length){const nf=[];for(const n of fr)for(const m of und[n])if(depth[m]===undefined){depth[m]=depth[n]+1;dmax=Math.max(dmax,depth[m]);nf.push(m)}fr=nf}
  topics.forEach(t=>{const d=depth[t.id]!==undefined?depth[t.id]:dmax+1;t.reveal=d*220+((hash(t.id)>>6)%180);introMax=Math.max(introMax,t.reveal)});
  introStart=performance.now()+350;
  const rows=document.getElementById('rows');rows.innerHTML='';
  const present=[...new Set(topics.map(t=>t.subject))].sort((a,b)=>topics.filter(t=>t.subject===b).length-topics.filter(t=>t.subject===a).length);
  present.forEach(s=>{on[s]=1;if(!COLORS[s]){COLORS[s]=FALLBACK;RGB[s]=RGBF}
    const n=topics.filter(t=>t.subject===s).length;
    const div=document.createElement('div');div.className='row';div.dataset.s=s;
    div.innerHTML=`<span class="swatch" style="background:${COLORS[s]}"></span><span class="lbl">${subjName(s)}</span><span class="n">${n}</span>`;
    div.onclick=()=>{on[s]=!on[s];div.classList.toggle('off',!on[s])};
    rows.appendChild(div);});
  applyLang();
  requestAnimationFrame(frame);
});
applyLang();
if(LANG==='en'){document.getElementById('langLT').classList.remove('on');document.getElementById('langEN').classList.add('on')}
function project(t,W,H){
  const cy=Math.cos(cam.yaw),sy=Math.sin(cam.yaw);
  let x=t.x3*cy-t.z3*sy, z=t.x3*sy+t.z3*cy, y=t.y3;
  const cp=Math.cos(cam.pitch),sp=Math.sin(cam.pitch);
  let y2=y*cp-z*sp, z2=y*sp+z*cp;
  const zc=z2+cam.dist, s=F/Math.max(120,zc);
  return {x:W*0.5+90+(x*s)+cam.panX, y:H*0.52-(y2*s)+cam.panY, s, z:zc};
}
function ageClass(t){ // 'now'|'done'|'next'|'later'|null(visi)
  if(ageSel===null)return null;
  if(t.ageRangeStart<=ageSel && ageSel<=t.ageRangeEnd)return 'now';
  if(t.ageRangeEnd<ageSel)return 'done';
  if(t.ageRangeStart===ageSel+1)return 'next';
  return 'later';
}
function visible(t){ if(!on[t.subject])return false; if(t.private && !privOn)return false; return true; }
function frame(now){
  stepTween(now);
  const W=innerWidth,H=innerHeight;
  ctx.clearRect(0,0,W,H);
  const it=now-introStart;
  if(!introDone && it>introMax+800)introDone=true;
  if(!sel&&!tween&&now-lastInteract>4000)cam.yaw+=0.0014;
  const P={};let zmin=1e9,zmax=-1e9;
  topics.forEach(t=>{const p=project(t,W,H);P[t.id]=p;if(p.z<zmin)zmin=p.z;if(p.z>zmax)zmax=p.z});
  const zr=Math.max(1,zmax-zmin);
  deps.forEach(e=>{
    const a=byId[e.prerequisiteId],b=byId[e.topicId];
    if(!visible(a)&&!visible(b))return;
    let grow=1,flash=0;
    if(!introDone){const born=Math.max(a.reveal,b.reveal)+140;const ea=it-born;if(ea<0)return;grow=Math.min(1,ea/320);if(ea<600)flash=1-ea/600}
    const hl=sel&&((ancestors.has(e.topicId)||e.topicId===sel.id)&&(ancestors.has(e.prerequisiteId)||e.prerequisiteId===sel.id));
    const pa=P[a.id],pb=P[b.id];
    const ex=pa.x+(pb.x-pa.x)*grow, ey=pa.y+(pb.y-pa.y)*grow;
    if(sel&&!hl){ctx.strokeStyle='rgba(90,84,112,.035)';ctx.lineWidth=.5}
    else if(hl){ctx.strokeStyle=rgba(a.subject,.85);ctx.lineWidth=2}
    else{ctx.strokeStyle=flash>0?rgba(a.subject,.06+flash*.4):'rgba(90,84,112,.07)';ctx.lineWidth=.6+flash*.8}
    ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(ex,ey);ctx.stroke();});
  const order=[...topics].sort((a,b)=>P[b.id].z-P[a.id].z);
  order.forEach(t=>{
    if(!visible(t))return;
    let scale=1,glow=0;
    if(!introDone){const na=it-t.reveal;if(na<0)return;scale=Math.min(1,na/300);scale=1-Math.pow(1-scale,3);if(na<650)glow=1-na/650}
    const p=P[t.id], depthc=1-(p.z-zmin)/zr;
    let r=Math.max(1,t.baseR*p.s*1.15)*scale, al=.45+.5*depthc;
    const ac=ageClass(t);
    if(ac==='done'){al*=.35}
    else if(ac==='next'){al=Math.min(1,al+.1)}
    else if(ac==='later'){al*=.12}
    else if(ac==='now'){al=1;r*=1.25}
    const isSel=sel&&t.id===sel.id, isAnc=sel&&ancestors.has(t.id);
    if(sel){ if(isSel||isAnc){al=1} else al*=.15; }
    if(glow>0){ctx.globalAlpha=glow*.4;ctx.fillStyle=rgba(t.subject,1);ctx.beginPath();ctx.arc(p.x,p.y,r*(1+glow*2.4),0,7);ctx.fill();}
    ctx.globalAlpha=al;
    ctx.fillStyle=COLORS[t.subject];
    ctx.beginPath();ctx.arc(p.x,p.y,isSel?r+2.5:r,0,7);ctx.fill();
    if(ac==='next'&&!sel){ctx.globalAlpha=Math.min(1,al+.25);ctx.strokeStyle=rgba(t.subject,1);ctx.lineWidth=1.6;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,7);ctx.stroke();ctx.setLineDash([])}
    if(t.private){ctx.globalAlpha=al;ctx.strokeStyle='#8a63c9';ctx.lineWidth=1.2;ctx.setLineDash([2,3]);ctx.beginPath();ctx.arc(p.x,p.y,r+3,0,7);ctx.stroke();ctx.setLineDash([])}
    if(isSel||isAnc){ctx.globalAlpha=.32;ctx.strokeStyle=rgba(t.subject,1);ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,r+(isSel?7:4),0,7);ctx.stroke();}
    if(isSel){ctx.globalAlpha=1;ctx.strokeStyle='#3a3550';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,r+6,0,7);ctx.stroke();}
  });
  ctx.globalAlpha=1;
  requestAnimationFrame(frame);
}
function collect(id,map,out){(map[id]||[]).forEach(n=>{if(!out.has(n)){out.add(n);collect(n,map,out)}})}
cv.addEventListener('contextmenu',e=>e.preventDefault());
cv.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,btn:e.button,shift:e.shiftKey,moved:0};lastInteract=performance.now()});
addEventListener('mousemove',e=>{if(!drag)return;const dx=e.clientX-drag.x,dy=e.clientY-drag.y;
  if(drag.btn===2||drag.shift){cam.panX+=dx;cam.panY+=dy}
  else{cam.yaw+=dx*.005;cam.pitch=Math.max(-.9,Math.min(.9,cam.pitch-dy*.003))}
  drag.x=e.clientX;drag.y=e.clientY;drag.moved+=Math.abs(dx)+Math.abs(dy);lastInteract=performance.now()});
addEventListener('mouseup',e=>{const was=drag&&drag.moved>6,btn=drag?drag.btn:0;drag=null;if(!was&&btn===0)pick(e.clientX,e.clientY)});
cv.addEventListener('wheel',e=>{e.preventDefault();cam.dist=Math.max(600,Math.min(2600,cam.dist*(1+e.deltaY*.0012)));lastInteract=performance.now()},{passive:false});
cv.addEventListener('dblclick',()=>{tweenTo({...DEF},700);lastInteract=performance.now()});
let touches={};
cv.addEventListener('touchstart',e=>{lastInteract=performance.now();
  if(e.touches.length===1)drag={x:e.touches[0].clientX,y:e.touches[0].clientY,btn:0,moved:0};
  if(e.touches.length===2){drag=null;touches.d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}},{passive:true});
cv.addEventListener('touchmove',e=>{lastInteract=performance.now();
  if(e.touches.length===1&&drag){const dx=e.touches[0].clientX-drag.x,dy=e.touches[0].clientY-drag.y;cam.yaw+=dx*.005;cam.pitch=Math.max(-.9,Math.min(.9,cam.pitch-dy*.003));drag.x=e.touches[0].clientX;drag.y=e.touches[0].clientY;drag.moved+=Math.abs(dx)+Math.abs(dy)}
  if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);cam.dist=Math.max(600,Math.min(2600,cam.dist*touches.d/d));touches.d=d}},{passive:true});
cv.addEventListener('touchend',e=>{const was=drag&&drag.moved>8;const t=e.changedTouches[0];const had=!!drag;drag=null;if(had&&!was)pick(t.clientX,t.clientY)});
function pick(mx,my){
  const W=innerWidth,H=innerHeight;let best=null,bd=22*22;
  topics.forEach(t=>{if(!visible(t))return;const p=project(t,W,H);const d=(p.x-mx)**2+(p.y-my)**2;if(d<bd){bd=d;best=t}});
  if(best)select(best);
  else{sel=null;document.getElementById('panel').classList.remove('open')}
}
function select(t){
  const S=STR[LANG];
  sel=t;ancestors=new Set();descendants=new Set();
  collect(t.id,pars,ancestors);collect(t.id,childs,descendants);
  let ty=-Math.PI/2 - t.theta;
  while(ty-cam.yaw>Math.PI)ty-=2*Math.PI;while(ty-cam.yaw<-Math.PI)ty+=2*Math.PI;
  tweenTo({yaw:ty,dist:Math.max(800,cam.dist*.9),panX:0,panY:0},700);
  const ac=ageClass(t);
  const acLbl=ac?{'now':S.now,'done':S.done,'next':S.next,'later':S.later}[ac]:'';
  const dir=(pars[t.id]||[]).map(id=>byId[id]);
  const un=(childs[t.id]||[]).map(id=>byId[id]);
  const li=x=>`<li class="link" onclick="select(byId['${x.id}'])"><span style="color:${COLORS[x.subject]}">●</span> ${x.name}<span class="age">${x.ageRangeStart}–${x.ageRangeEnd} ${S.yrs}</span></li>`;
  const pn=document.getElementById('panel');
  pn.innerHTML=`
    <span class="close" onclick="sel=null;this.parentElement.classList.remove('open')">✕</span>
    <div class="kicker" style="color:${COLORS[t.subject]}">● ${subjName(t.subject)} · ${t.domain}</div>
    <h2>${t.name}</h2>
    <span class="agechip">${t.ageRangeStart}–${t.ageRangeEnd} ${S.yrs}${acLbl?' · '+acLbl:''}</span>${t.private?`<span class="privchip">🏫 ${LANG==='en'?'private':'privatus'}</span>`:''}
    <div class="desc">${t.description}</div>
    ${t.assessmentPrompt?`<h4>${S.ask}</h4><div class="ask" style="border-color:${COLORS[t.subject]}">${t.assessmentPrompt.replaceAll('{{name}}',S.child)}</div>`:''}
    ${t.evidence&&t.evidence.length?`<h4>${S.ev}</h4><ul>${t.evidence.map(e=>`<li>· ${e}</li>`).join('')}</ul>`:''}
    ${dir.length?`<h4>${S.dep} (${dir.length})</h4><ul>${dir.map(li).join('')}</ul>`:''}
    ${un.length?`<h4>${S.un} (${un.length})</h4><ul>${un.map(li).join('')}</ul>`:''}`;
  pn.classList.add('open');
}
window.select=select;window.byId=byId;
</script>
